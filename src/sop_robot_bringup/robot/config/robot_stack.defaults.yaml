common:
    robot_parts: all
    camera_source: "http://127.0.0.1:4747/video"
    voice_config_path: config/voice_chatbot.json
    joint_calibration_path: config/shoulder_calibration.yaml
    shoulder_calibration_path: config/shoulder_calibration.yaml
    load_voice_config: true
    runtime_log_level: warn
    enable_face_tracker: true
    enable_face_tracker_movement: true
    enable_voice_stack: true
    enable_chatbot_ui: true
    enable_calibration_ui: false
    enable_ros2graph_ui: false
    ros2graph_web_host: 127.0.0.1
    ros2graph_web_port: 8734
    ros2graph_update_interval: 1.0
    enable_full_demo: true
    enable_hand_gestures: true
    enable_shoulder_controller: true
    enable_jaw_movement: false
    face_tracker_functionality: full
    face_tracker_max_processing_fps: 0
    face_tracker_processing_width: 640
    face_image_publish_every_n_frames: 1
    face_image_publish_fps: 0.0
    face_recognition_model: SFace
    face_detection_model: yunet
    face_tracker_prefer_gpu: false
    gpu_face_recognition_model: SFace
    gpu_face_detection_model: yolov8n
    face_detection_confidence: 0.6
    face_detection_imgsz: 640
    no_face_detection_interval_frames: 1
    no_face_detection_warmup_frames: 3
    face_correlation_tracking: false
    face_detection_interval_frames: 1
    face_tracker_async_processing: true
    face_tracker_slow_frame_warning_seconds: 1.0
    face_tracker_processing_status_log_interval_seconds: 5.0
    face_image_max_width: 640
    identity_store_max_identities: 8
    identity_store_ttl_seconds: 300.0
    webcam_width: 640
    webcam_height: 480
    webcam_fps: 30
    webcam_capture_buffer_size: 1
    webcam_read_warning_seconds: 1.0
    webcam_reconnect_cooldown_seconds: 2.0
    webcam_status_log_interval_seconds: 5.0
    webcam_low_latency_stream: true
    webcam_async_capture: true
    cpu_affinity:
        ros2_control: ""
        face_tracker: ""
        webcam: ""
        asr: ""
        llm: ""
        tts: ""
        rviz: ""
real:
    use_rviz: false
    enabled_controllers: head_controller,eyes_controller,jaw_controller,l_hand_controller
fake:
    use_rviz: false
    enabled_controllers: head_controller,eyes_controller,jaw_controller,r_hand_controller,shoulder_controller,l_hand_controller
