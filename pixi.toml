[workspace]
name = "sop-robot"
version = "0.1.0"
description = "SOP-Robot – ROS 2 Humble robotics platform with voice interaction, face tracking, and hardware control"
channels = ["robostack-staging", "conda-forge"]
platforms = ["linux-64", "win-64"]

[dependencies]
# Python
python = ">=3.10,<3.12"
pip = "*"
numpy = ">=1.26,<2"

# Build tools
cmake = "*"
git = "*"
colcon-common-extensions = "*"
compilers = "*"

# ROS 2 Humble core (ros-base avoids heavy GUI/OpenGL deps that break on WSL)
ros-humble-ros-base = "*"
ros-humble-ament-cmake = "*"
ros-humble-launch = "*"
ros-humble-launch-ros = "*"
ros-humble-rclpy = "*"
ros-humble-rclcpp = "*"
ros-humble-std-msgs = "*"
ros-humble-std-srvs = "*"
ros-humble-geometry-msgs = "*"
ros-humble-sensor-msgs = "*"
ros-humble-rosidl-default-generators = "*"
ros-humble-rosidl-default-runtime = "*"

# ROS 2 control framework
ros-humble-ros2-control = "*"
ros-humble-ros2-controllers = "*"
ros-humble-control-msgs = "*"
ros-humble-control-toolbox = "*"
ros-humble-realtime-tools = "*"
ros-humble-joint-trajectory-controller = "*"
ros-humble-generate-parameter-library = "*"

# Dynamixel
ros-humble-dynamixel-sdk = "*"

# Robot description & utilities
ros-humble-xacro = "*"
ros-humble-angles = "*"
ros-humble-camera-calibration-parsers = "*"

# Visualization
ros-humble-rviz2 = "*"

# Messaging
ros-humble-test-msgs = "*"
ros-humble-action-msgs = "*"

# Hardware interface dependencies
ros-humble-hardware-interface = "*"
ros-humble-pluginlib = "*"

# System libraries (espeak must be installed via apt: sudo apt install espeak)
yaml-cpp = "*"
bullet = "*"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]

[pypi-dependencies]
# Voice chatbot pipeline
voice-chatbot = { version = "*", extras = ["all"] }
llama-cpp-python = "==0.3.19"
transformers = ">=4.44,<4.46"
torch = "==2.7.1"
torchaudio = "==2.7.1"

# Face tracking / vision
deepface = ">=0.0.92,<0.1"
dlib = ">=19.24,<20.0"
opencv-python = ">=4.10,<5.0"
keras = ">=3.0,<4.0"
h5py = ">=3.10,<4.0"

# Speech & audio
SpeechRecognition = ">=3.10,<4.0"
simpleaudio = ">=1.0,<2.0"

# NLP / translation
langdetect = ">=1.0,<2.0"
translate = ">=3.6,<4.0"
chatterbot = ">=1.2,<2.0"

# Misc
PyYAML = ">=6.0,<7.0"
progressbar2 = "*"

[tasks]
# ── Setup ──────────────────────────────────────────────────────────────
setup-models = { cmd = "python src/voice_chatbot_ros/tools/setup_models.py", description = "Download and cache all required models (LLM, STT, TTS, VAD)" }

download-tts-model = { cmd = "python -c \"import os,tempfile,urllib.request,zipfile; dst='src/tts_package/resource'; os.makedirs(dst,exist_ok=True); z=os.path.join(tempfile.gettempdir(),'model.zip'); urllib.request.urlretrieve('https://github.com/ouspg/SOP-Robot/releases/download/model/model.zip',z); zipfile.ZipFile(z).extractall(dst); os.remove(z)\"", description = "Download legacy TTS model for tts_package (cross-platform)" }

init-submodules = { cmd = "git submodule update --init --recursive", description = "Initialize git submodules (dynamixel packages)" }

# ── Build ──────────────────────────────────────────────────────────────
build = { cmd = """
  python -c "
import subprocess, sys, sysconfig, os
prefix = sys.prefix.replace(os.sep, '/')
exe = sys.executable.replace(os.sep, '/')
inc = sysconfig.get_path('include').replace(os.sep, '/')
lib = prefix + '/libs/python311.lib'
np_inc = prefix + '/Lib/site-packages/numpy/core/include'
subprocess.run([
    'colcon', 'build',
    '--packages-skip', 'tts_package', 'dynamixel_workbench_toolbox', 'dynamixel_workbench', 'robot_hardware', 'robot',
    '--cmake-args',
    f'-DPython3_EXECUTABLE={exe}',
    f'-DPython3_INCLUDE_DIR={inc}',
    f'-DPython3_LIBRARY={lib}',
    f'-DPython_EXECUTABLE={exe}',
    f'-DPython_INCLUDE_DIR={inc}',
    f'-DPython_LIBRARY={lib}',
    f'-DPython_NumPy_INCLUDE_DIR={np_inc}',
], check=True)
"
""", depends-on = ["init-submodules"], description = "Build all ROS 2 packages (hardware/driver C++ packages skipped on Windows)" }

# ── Udev rules (Linux only, requires sudo) ────────────────────────────
setup-udev = { cmd = """
  sudo cp src/dynamixel-workbench/99-dynamixel-workbench-cdc.rules /etc/udev/rules.d/ && \
  sudo udevadm control --reload-rules && \
  sudo udevadm trigger
""", description = "Install Dynamixel U2D2 udev rules (requires sudo)" }

# ── Launch ─────────────────────────────────────────────────────────────
ros-launch-robot = { cmd = "ros2 launch robot robot.launch.py", description = "Launch real robot hardware" }
ros-launch-robot-fake = { cmd = "ros2 launch robot robot.fake.launch.py", description = "Launch simulated robot hardware" }
ros-launch-voice = { cmd = "bash src/voice_chatbot_ros/tools/ros_launch_pixi.sh", description = "Launch voice chatbot (STT + LLM + TTS)" }
ros-face-tracker = { cmd = "ros2 launch face_tracker face_tracker.test.launch.py", description = "Launch face tracker" }
ros-full-demo = { cmd = "ros2 run full_demo full_demo_node", description = "Run full demo orchestrator" }

# ── Unified UI ────────────────────────────────────────────────────────
ros-unified-ui = { cmd = "python src/voice_chatbot_ros/tools/run_unified_ui.py", description = "Launch unified UI (RViz + image viewer + voice chatbot)" }
ros-start-all = { cmd = "src/voice_chatbot_ros/tools/ros_start_all.bat", description = "Launch all voice chatbot nodes + unified UI in Windows Terminal tabs" }
