[workspace]
name = "sop-robot"
version = "0.1.0"
description = "SOP-Robot – ROS 2 Humble robotics platform with voice interaction, face tracking, and hardware control"
channels = ["robostack-staging", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Python
python = ">=3.10,<3.12"
pip = "*"
setuptools = ">=69.5,<80"
numpy = ">=1.26,<2"

# Build tools
cmake = "*"
git = "*"
colcon-common-extensions = "*"
compilers = "*"

# ROS 2 Humble core (ros-base avoids heavy GUI/OpenGL deps that break on WSL)
ros-humble-ros-base = "*"
ros-humble-ament-cmake = "*"
ros-humble-launch = "*"
ros-humble-launch-ros = "*"
ros-humble-rclpy = "*"
ros-humble-rclcpp = "*"
ros-humble-std-msgs = "*"
ros-humble-std-srvs = "*"
ros-humble-geometry-msgs = "*"
ros-humble-sensor-msgs = "*"
ros-humble-rosidl-default-generators = "*"
ros-humble-rosidl-default-runtime = "*"
ros-humble-rviz2 = "*"
ros-humble-rqt-image-view = "*"

# ROS 2 control framework
ros-humble-ros2-control = "*"
ros-humble-ros2-controllers = "*"
ros-humble-control-msgs = "*"
ros-humble-control-toolbox = "*"
ros-humble-realtime-tools = "*"
ros-humble-joint-trajectory-controller = "*"
ros-humble-generate-parameter-library = "*"

# Dynamixel
ros-humble-dynamixel-sdk = "*"

# Robot description & utilities
ros-humble-xacro = "*"
ros-humble-angles = "*"
ros-humble-camera-calibration-parsers = "*"

# Messaging
ros-humble-test-msgs = "*"
ros-humble-action-msgs = "*"

# Hardware interface dependencies
ros-humble-hardware-interface = "*"
ros-humble-pluginlib = "*"

# System libraries (espeak must be installed via apt: sudo apt install espeak)
yaml-cpp = "*"
bullet = "*"
alsa-lib = "*"
alsa-plugins = "*"
portaudio = "*"
# Install the audio backend from conda-forge so Linux doesn't need to build
# `simpleaudio` against local ALSA headers during `pixi install`.
simpleaudio = "*"

[target.linux-64.pypi-dependencies]
nvidia-cublas-cu12 = "*"
nvidia-cuda-runtime-cu12 = "*"
nvidia-cudnn-cu12 = "==9.*"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu130"]

[pypi-dependencies]
# Voice chatbot pipeline
voice-chatbot = { version = "*", extras = ["all"] }
llama-cpp-python = "==0.3.19"
transformers = ">=4.44,<4.46"
torch = "==2.10.0"
torchaudio = "==2.10.0"

# Face tracking / vision
deepface = ">=0.0.92,<0.1"
dlib = ">=19.24,<20.0"
opencv-python = ">=4.10,<5.0"
keras = ">=3.0,<4.0"
tf-keras = ">=2.20,<2.21"
h5py = ">=3.10,<4.0"
ultralytics = ">=8.3,<9"

# Speech & audio
SpeechRecognition = ">=3.10,<4.0"

# NLP / translation
langdetect = ">=1.0,<2.0"
translate = ">=3.6,<4.0"
chatterbot = ">=1.2,<2.0"

# Misc
PyYAML = ">=6.0,<7.0"
progressbar2 = "*"

[tasks]
# ── Setup ──────────────────────────────────────────────────────────────
ensure-setuptools-compat = { cmd = "python src/voice_chatbot_ros/tools/ensure_setuptools_compat.py", description = "Downgrade setuptools when needed so ROS 2 Humble colcon builds work with --symlink-install" }
ensure-llm-cuda = { cmd = "python src/voice_chatbot_ros/tools/ensure_llama_cuda.py" }
setup-models = { cmd = "python src/voice_chatbot_ros/tools/setup_models.py", description = "Download and cache all required models (LLM, STT, TTS, VAD)" }

download-tts-model = { cmd = """
  mkdir -p src/tts_package/resource && \
  curl -L https://github.com/ouspg/SOP-Robot/releases/download/model/model.zip -o /tmp/model.zip && \
  unzip -o /tmp/model.zip -d src/tts_package/resource && \
  rm /tmp/model.zip
""", description = "Download legacy TTS model for tts_package" }

init-submodules = { cmd = "git submodule update --init --recursive", description = "Initialize git submodules (dynamixel packages)" }

# ── Build ──────────────────────────────────────────────────────────────
build = { cmd = "colcon build --symlink-install", depends-on = ["init-submodules", "ensure-setuptools-compat"], description = "Build all ROS 2 packages with colcon" }

# ── Udev rules (requires sudo) ────────────────────────────────────────
setup-udev = { cmd = """
  sudo cp src/dynamixel-workbench/99-dynamixel-workbench-cdc.rules /etc/udev/rules.d/ && \
  sudo udevadm control --reload-rules && \
  sudo udevadm trigger
""", description = "Install Dynamixel U2D2 udev rules (requires sudo)" }

# ── Launch ─────────────────────────────────────────────────────────────
ros-launch-robot = { cmd = "bash src/voice_chatbot_ros/tools/ros_exec_pixi.sh launch robot robot.launch.py", description = "Launch real robot hardware" }
ros-launch-robot-fake = { cmd = "bash src/voice_chatbot_ros/tools/ros_exec_pixi.sh launch robot robot.fake.launch.py use_rviz:=false", description = "Launch simulated robot hardware" }
ros-launch-robot-fake-rviz = { cmd = "bash src/voice_chatbot_ros/tools/ros_exec_pixi.sh launch robot robot.fake.launch.py use_rviz:=true", description = "Launch simulated robot hardware with RViz" }
ros-launch-voice = { cmd = "bash src/voice_chatbot_ros/tools/ros_launch_pixi.sh", description = "Launch voice chatbot (STT + LLM + TTS)" }
ros-face-tracker = { cmd = "bash src/voice_chatbot_ros/tools/ros_exec_pixi.sh launch face_tracker face_tracker.test.launch.py", description = "Launch face tracker" }
ros-full-demo = { cmd = "bash src/voice_chatbot_ros/tools/ros_exec_pixi.sh run full_demo full_demo_node", description = "Run full demo orchestrator" }
ros-start = { cmd = "bash src/voice_chatbot_ros/tools/ros_start_all.sh" }
start_robot_head_simulation = { cmd = "./start_robot_head_simulation", description = "Start robot head simulation (fake hardware + voice chatbot + movement)" }
